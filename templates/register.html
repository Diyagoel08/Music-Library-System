<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Harmony</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: var(--bg-beige);
        }
        .auth-container {
            background: var(--sidebar-pink);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(212, 129, 129, 0.2);
            width: 350px;
            text-align: center;
        }
        .auth-container h2 { color: var(--accent-dark-pink); }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #fff;
            outline: none;
        }
        .btn-auth {
            width: 100%;
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-link {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-main);
        }
        .auth-link a { color: var(--accent-dark-pink); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Join Harmony</h2>
        <p>Start your music journey</p>
        <form action="/register" method="POST">
            <input type="text" name="username" class="auth-input" placeholder="Username" required>
            <input type="email" name="email" class="auth-input" placeholder="Email Address" required>
            <input type="password" name="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="btn-auth">Sign Up</button>
        </form>
        <div class="auth-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
